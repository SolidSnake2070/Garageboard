<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Garage Panel</title>
<style>

body{
background:#0b0f14;
color:#e9f1fb;
font-family:Arial;
padding:40px;
}

h1{
letter-spacing:3px;
}

.panel{
background:#121922;
padding:20px;
border-radius:10px;
margin-bottom:20px;
width:350px;
}

.value{
font-size:28px;
margin:10px 0;
}

.ok{color:#2ecc71}
.warn{color:#f1c40f}
.due{color:#e74c3c}

</style>
</head>

<body>

<h1>GARAGE PANEL</h1>

<div class="panel">
<h2>KX250F</h2>
<div class="value">72 h</div>
Ölwechsel: 77 h
</div>

<div class="panel">
<h2>KX85</h2>
<div class="value">20.4 h</div>
Kolben: 40 h
</div>

<div class="panel">
<h2>KTM 690</h2>
<div class="value">46799 km</div>
Ölwechsel: 50000 km
</div>

</body>
</html>
